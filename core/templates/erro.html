<!DOCTYPE html>
<html lang="pt-br">
<head>
        <meta charset="UTF-8">
        <title>Erro - {{ empresa.nome }}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <style>
                :root {
                        --primary-color: #0062ff;
                        --bg-gradient: radial-gradient(circle at 0% 0%, #f8fafc 0%, #e2e8f0 100%);
                        --font-main: 'Plus Jakarta Sans', sans-serif;
                }
                body.bg-premium {
                        background: var(--bg-gradient);
                        font-family: var(--font-main);
                        color: #1e293b;
                        overflow-x: hidden;
                }
                .glass-card {
                        background: rgba(255, 255, 255, 0.7) !important;
                        backdrop-filter: blur(15px);
                        -webkit-backdrop-filter: blur(15px);
                        border: 1px solid rgba(255, 255, 255, 0.4) !important;
                        border-radius: 24px !important;
                }
                .animate-in {
                        animation: fadeInUp 0.8s ease-out forwards;
                }
                @keyframes fadeInUp {
                        from { opacity: 0; transform: translateY(30px); }
                        to { opacity: 1; transform: translateY(0); }
                }
        </style>
</head>
<body class="bg-premium">
        <div class="d-flex" style="min-height: 100vh;">
            <!-- Sidebar vertical -->
            <nav class="sidebar bg-dark text-white d-flex flex-column flex-shrink-0 p-3" style="width: 250px; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 1040;">
                <a href="{% url 'core:index' %}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                    <span class="fs-4 fw-bold">{{ empresa.nome }}</span>
                </a>
                <hr class="bg-secondary">
                <ul class="nav nav-pills flex-column mb-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item mb-1">
                            <a href="{% url 'core:dashboard' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'dashboard' %}active bg-primary{% endif %}">
                                <i class="bi bi-speedometer2 me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item mb-1">
                            <a href="{% url 'core:listar_orcamentos' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'listar_orcamentos' %}active bg-primary{% endif %}">
                                <i class="bi bi-file-earmark-text me-2"></i> Orçamentos
                            </a>
                        </li>
                        <li class="nav-item mb-1">
                            <a href="{% url 'core:fluxo_bancario' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'fluxo_bancario' %}active bg-primary{% endif %}">
                                <i class="bi bi-cash-coin me-2"></i> Fluxo Bancário
                            </a>
                        </li>
                        <li class="nav-item mb-1">
                            <a href="{% url 'core:configuracoes' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'configuracoes' %}active bg-primary{% endif %}">
                                <i class="bi bi-gear me-2"></i> Configurações
                            </a>
                        </li>
                        <li class="nav-item mb-1">
                            <a href="{% url 'core:suporte' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'suporte' %}active bg-primary{% endif %}">
                                <i class="bi bi-question-circle me-2"></i> Suporte
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <a href="{% url 'core:logout' %}" class="nav-link text-white">
                                <i class="bi bi-box-arrow-right me-2"></i> Sair
                            </a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a href="{% url 'core:login' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'login' %}active bg-primary{% endif %}">
                                <i class="bi bi-person me-2"></i> Login
                            </a>
                        </li>
                    {% endif %}
                </ul>
                <hr class="bg-secondary mt-auto">
                <div class="text-center small opacity-50">© 2026 Fluxxo Solutions</div>
            </nav>

            <!-- Conteúdo principal -->
            <div class="flex-grow-1" style="margin-left: 250px;">
                <div class="container py-5">
                    <h2>Erro</h2>
                    <p>{{ mensagem }}</p>
                    <a href="{% url 'core:index' %}">Voltar ao início</a>
                </div>
            </div>
        </div>
</body>
</html>

    <meta charset="UTF-8">
    <title>Erro</title>
</head>
<body>
    <h1>Erro</h1>
    <p>{{ mensagem }}</p>
    <a href="{% url 'core:index' %}">Voltar ao início</a>
</body>
</html>
