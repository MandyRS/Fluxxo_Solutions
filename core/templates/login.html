{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Seguro | Fluxxo Solutions</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="bg-animation" id="bgAnimation"></div>

    <div class="login-container">
        <div class="glass-card login-card animate-pop-in">
            <div class="logo-header">
                <h2>Fluxxo<span class="dot">.</span><span class="solutions">Solutions</span></h2>
                <p class="subtitle">Plataforma de Gestão Financeira</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert-error animate-fade-in">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}
                
                <div class="input-group">
                    <input type="text" name="username" id="username" required placeholder=" ">
                    <label for="username">Nome de Usuário</label>
                    <div class="bar"></div>
                </div>

                <div class="input-group">
                    <input type="password" name="password" id="password" required placeholder=" ">
                    <label for="password">Sua Senha</label>
                    <div class="bar"></div>
                </div>

                <div class="form-actions">
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-primary-top w-100">
                    Acessar Painel <span class="arrow">→</span>
                </button>
                
                <button type="button" class="btn-secondary-top w-100" onclick="window.location.href='/'">
                    Voltar para Home
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/bg_animation.js"></script>
</body>
</html>
