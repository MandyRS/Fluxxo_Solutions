<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}ControleFlexx{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  {# <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css"> #}
  <link rel="icon" type="image/png" sizes="32x32" href="shuffle-for-bootstrap.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
  
</head>
<body class="bg-premium">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'core:index' %}">
          Fluxxo<span class="text-primary">.</span><span class="fw-light text-secondary">Solutions</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            {% if user.is_authenticated %}
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active text-primary fw-bold{% endif %}" href="{% url 'core:dashboard' %}">
                  <i class="bi bi-speedometer2 me-1"></i> Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'listar_orcamentos' %}active text-primary fw-bold{% endif %}" href="{% url 'core:listar_orcamentos' %}">
                  <i class="bi bi-file-earmark-text me-1"></i> Orçamentos
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'fluxo_bancario' %}active text-primary fw-bold{% endif %}" href="{% url 'core:fluxo_bancario' %}">
                  <i class="bi bi-cash-coin me-1"></i> Fluxo Bancário
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'estoque' %}active text-primary fw-bold{% endif %}" href="{% url 'core:estoque' %}">
                  <i class="bi bi-boxes me-1"></i> Estoque
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'configuracoes' %}active text-primary fw-bold{% endif %}" href="{% url 'core:configuracoes' %}">
                  <i class="bi bi-gear me-1"></i> Configurações
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'suporte' %}active text-primary fw-bold{% endif %}" href="{% url 'core:suporte' %}">
                  <i class="bi bi-question-circle me-1"></i> Suporte
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'core:logout' %}">
                  <i class="bi bi-box-arrow-right me-1"></i> Sair
                </a>
              </li>
            {% else %}
              <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'login' %}active text-primary fw-bold{% endif %}" href="{% url 'core:login' %}">
                  <i class="bi bi-person me-1"></i> Login
                </a>
              </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container-fluid py-4">
      {% block content %}{% endblock %}
      <footer class="text-center small opacity-50 mt-5">© 2026 Fluxxo Solutions</footer>
    </div>
    <!-- jQuery + Bootstrap JS no final do body para garantir funcionamento de todos os scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</body>
</html>
